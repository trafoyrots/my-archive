<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>삼국지 영걸전 아카이브</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PW92P22RPV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-PW92P22RPV', {
          cookie_domain: 'dosgame.pages.dev'
      });
    </script>
    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background: #f4f4f9; color: #333; font-family: 'Malgun Gothic', sans-serif; touch-action: manipulation; }
        .intro-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; text-align: center; background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%); padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .intro-content { width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; box-sizing: border-box; }
        .game-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        h1 { font-size: 2rem; color: #2c3e50; margin: 0 0 15px 0; border-bottom: 3px solid #b71c1c; display: inline-block; padding-bottom: 5px; }
        p { margin-bottom: 30px; color: #666; font-size: 1rem; line-height: 1.5; }
        
        .start-btn { display: block; width: 100%; padding: 18px 0; font-size: 1.2rem; font-weight: bold; color: #fff; background: #2c3e50; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        .start-btn:hover { background: #b71c1c; }

        #admin-panel { margin-top: 20px; padding: 15px; background: #f0f7ff; border: 1px solid #adc6ff; border-radius: 10px; font-size: 0.9rem; color: #1d39c4; display: none; text-align: center; line-height: 1.6; }
        .ga-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #1d39c4; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: background 0.3s; }
        .ga-btn:hover { background: #092bbf; }

        .copyright-section { padding: 20px 0; font-size: 0.8rem; color: #888; line-height: 1.6; width: 100%; max-width: 500px; margin-top: auto; }
        .copyright-section hr { width: 40px; border: 0; border-top: 1px solid #ccc; margin: 15px auto; }
        #dos { width: 100vw; height: 100vh; display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        
        .game-menu { display: none; position: fixed; top: 15px; right: 15px; z-index: 2000; flex-direction: column; gap: 8px; }
        .game-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.8); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: background 0.2s; }
        .game-btn:hover { background: rgba(183, 28, 28, 0.9); }

        .gamepad { display: none; position: fixed; bottom: 30px; left: 0; right: 0; z-index: 2000; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 5px; pointer-events: auto; }
        .dpad button, .action-keys button { background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%; color: white; font-size: 1.5rem; user-select: none; cursor: pointer; backdrop-filter: blur(2px); touch-action: none; }
        .dpad button:active, .action-keys button:active { background: rgba(255, 255, 255, 0.6); }
        .dpad .up { grid-column: 2; grid-row: 1; }
        .dpad .left { grid-column: 1; grid-row: 2; }
        .dpad .right { grid-column: 3; grid-row: 2; }
        .dpad .down { grid-column: 2; grid-row: 3; }
        .action-keys { display: flex; gap: 15px; align-items: flex-end; pointer-events: auto; }
        .action-keys button { width: 70px; height: 70px; font-size: 1rem; font-weight: bold; border-radius: 15px; }
        
        @media (max-width: 768px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .action-keys button { width: 60px; height: 60px; }
        }
    </style>
</head>
<body onload="checkAccess()">

    <div id="intro-layer" class="intro-container" style="display: none;">
        <div class="intro-content">
            <img src="sddefault.jpg" alt="삼국지 영걸전" class="game-img">
            <h1>삼국지 영걸전</h1>
            <p>비영리 목적으로 운영되는 팬 메이드 페이지입니다.</p>
            
            <button class="start-btn" onclick="launchGame()">게임 플레이하기</button>

            <div id="admin-panel">
                <strong>📊 관리자 통계 모드 활성화</strong><br><br>
                구글 애널리틱스 센서가 정상 작동 중입니다.<br>
                정확한 방문자 및 실행 횟수는 대시보드에서 확인하세요.
                <br>
                <a href="https://analytics.google.com/" target="_blank" class="ga-btn">구글 통계 확인하기</a>
            </div>
        </div>

        <div class="copyright-section">
            <hr>
            This project is a non-profit fan-made archive.<br>
            All rights for the original game belong to KOEI.<br>
            권리자의 요청 시 즉시 삭제될 수 있습니다.
        </div>
    </div>

    <div id="dos"></div>

    <input type="file" id="save-upload" style="display: none;" onchange="uploadSave(event)">

    <div id="game-menu" class="game-menu">
        <button class="game-btn" onclick="document.getElementById('save-upload').click()">📂 세이브 업로드</button>
        <button class="game-btn" onclick="downloadSaves()">💾 세이브 다운로드</button>
        <button class="game-btn" onclick="toggleGamepad()">🎮 모바일 키패드</button>
    </div>

    <div id="gamepad" class="gamepad">
        <div class="dpad">
            <button class="up" onmousedown="pressKey(38, event)" onmouseup="releaseKey(38, event)" onmouseleave="releaseKey(38, event)" ontouchstart="pressKey(38, event)" ontouchend="releaseKey(38, event)" ontouchcancel="releaseKey(38, event)">▲</button>
            <button class="left" onmousedown="pressKey(37, event)" onmouseup="releaseKey(37, event)" onmouseleave="releaseKey(37, event)" ontouchstart="pressKey(37, event)" ontouchend="releaseKey(37, event)" ontouchcancel="releaseKey(37, event)">◀</button>
            <button class="right" onmousedown="pressKey(39, event)" onmouseup="releaseKey(39, event)" onmouseleave="releaseKey(39, event)" ontouchstart="pressKey(39, event)" ontouchend="releaseKey(39, event)" ontouchcancel="releaseKey(39, event)">▶</button>
            <button class="down" onmousedown="pressKey(40, event)" onmouseup="releaseKey(40, event)" onmouseleave="releaseKey(40, event)" ontouchstart="pressKey(40, event)" ontouchend="releaseKey(40, event)" ontouchcancel="releaseKey(40, event)">▼</button>
        </div>
        <div class="action-keys">
            <button onmousedown="pressKey(13, event)" onmouseup="releaseKey(13, event)" onmouseleave="releaseKey(13, event)" ontouchstart="pressKey(13, event)" ontouchend="releaseKey(13, event)" ontouchcancel="releaseKey(13, event)">ENTER</button>
            <button onmousedown="pressKey(27, event)" onmouseup="releaseKey(27, event)" onmouseleave="releaseKey(27, event)" ontouchstart="pressKey(27, event)" ontouchend="releaseKey(27, event)" ontouchcancel="releaseKey(27, event)">ESC</button>
        </div>
    </div>

    <script>
        const ENCODED_PW = "YWRtaW43Nzc=";
        let dosInterface = null; 

        function checkAccess() {
            const isPassed = sessionStorage.getItem("is_passed");
            const savedAdmin = sessionStorage.getItem("isAdmin");

            if (isPassed === "true") {
                showPage(savedAdmin === "true");
                return;
            }

            const password = prompt("접속 암호를 입력하세요.");
            if (password === "2026") {
                sessionStorage.setItem("is_passed", "true");
                sessionStorage.setItem("isAdmin", "false");
                showPage(false);
            } else if (btoa(password) === ENCODED_PW) { 
                sessionStorage.setItem("is_passed", "true");
                sessionStorage.setItem("isAdmin", "true");
                showPage(true);
            } else {
                alert("암호가 틀렸습니다.");
                location.reload();
            }
        }

        function showPage(adminMode) {
            document.getElementById("intro-layer").style.display = "flex";
            if (adminMode) {
                document.getElementById("admin-panel").style.display = "block";
            }
        }

        async function launchGame() {
            if (typeof gtag === 'function') {
                gtag('event', 'play_game', {
                    'event_category': 'Game',
                    'event_label': 'Eiketsuden Start'
                });
                console.log("구글 통계: 게임 실행 기록 전송 완료");
            }

            document.getElementById("intro-layer").style.display = "none";
            document.getElementById("dos").style.display = "block";
            
            document.getElementById("game-menu").style.display = "flex";

            try {
                Dos(document.getElementById("dos"), {
                    url: "./nuasuw2.dat",
                    noCloud: true,
                    autoStart: true
                }).then((ci) => {
                    dosInterface = ci; 
                    
                    if (ci && typeof ci.persist === "function") {
                        ci.persist("eiketsu-save-data");
                    }
                    ci.dos.main(["-c", "config -set cpu cycles=15000", "-c", "HERO.COM"]);
                });
            } catch (err) {
                console.error("게임 실행 오류:", err);
            }
        }

        function downloadSaves() {
            if (!dosInterface) return alert("게임이 로드되지 않았습니다.");
            
            const fileName = prompt("다운로드할 세이브 파일명을 정확히 입력하세요.\n(영걸전 예시: SAVEDAT0.DAT, SAVEDAT1.DAT 등)", "SAVEDAT0.DAT");
            if (!fileName) return;

            try {
                dosInterface.fs.readFile(fileName).then(data => {
                    const blob = new Blob([data], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = fileName;
                    a.click();
                    URL.revokeObjectURL(url);
                    alert(`[${fileName}] 다운로드가 완료되었습니다.`);
                }).catch(e => {
                    console.error(e);
                    alert("세이브 파일을 찾을 수 없습니다. 파일명을 다시 확인해주세요.");
                });
            } catch (err) {
                alert("지원되지 않는 버전의 js-dos이거나 내부 오류가 발생했습니다.");
            }
        }

        function uploadSave(event) {
            const file = event.target.files[0];
            if (!file || !dosInterface) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                try {
                    dosInterface.fs.writeFile(file.name, data).then(() => {
                        alert(`[${file.name}] 업로드 완료!\n게임 내에서 해당 슬롯을 로드해 주세요.`);
                    }).catch(err => {
                        console.error(err);
                        alert("파일 덮어쓰기 중 오류가 발생했습니다.");
                    });
                } catch(err) {
                    alert("업로드 처리 중 오류가 발생했습니다.");
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = ""; 
        }

        function toggleGamepad() {
            const pad = document.getElementById("gamepad");
            pad.style.display = (pad.style.display === "flex") ? "none" : "flex";
        }

        // 브라우저 기본 이벤트를 강제로 발생시켜 js-dos가 무조건 인식하도록 수정된 키 입력 함수
        function pressKey(code, e) {
            if(e && e.cancelable) e.preventDefault(); 
            
            // 1. 기존 js-dos 내부 API 방식 시도
            if (dosInterface) {
                if (typeof dosInterface.sendKeyEvent === "function") {
                    dosInterface.sendKeyEvent(code, true);
                } else if (typeof dosInterface.simulateKeyPress === "function") {
                    dosInterface.simulateKeyPress(code);
                }
            }

            // 2. 강제 키보드 이벤트 발생 (호환성 보장)
            const event = new KeyboardEvent("keydown", {
                keyCode: code,
                which: code,
                bubbles: true,
                cancelable: true
            });
            document.dispatchEvent(event);
            
            const canvas = document.querySelector('#dos canvas');
            if (canvas) canvas.dispatchEvent(event);
        }

        function releaseKey(code, e) {
            if(e && e.cancelable) e.preventDefault();
            
            if (dosInterface) {
                if (typeof dosInterface.sendKeyEvent === "function") {
                    dosInterface.sendKeyEvent(code, false);
                }
            }

            const event = new KeyboardEvent("keyup", {
                keyCode: code,
                which: code,
                bubbles: true,
                cancelable: true
            });
            document.dispatchEvent(event);
            
            const canvas = document.querySelector('#dos canvas');
            if (canvas) canvas.dispatchEvent(event);
        }
    </script>
</body>
</html>
