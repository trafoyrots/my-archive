<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼국지 영걸전 아카이브</title>
    
    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>

    <style>
        /* 기본 테마 및 배경 - 영걸전 느낌의 짙은 붉은색 계열 가미 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; color: #e0e0e0; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        
        /* 소개 페이지 레이아웃 */
        .intro-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; background: radial-gradient(circle, #4a1414 0%, #000 80%);
        }
        
        .intro-content { max-width: 600px; padding: 20px; animation: fadeIn 1.5s ease-out; }
        
        h1 { font-size: 3rem; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px rgba(183, 28, 28, 0.8); }
        p { font-size: 1.1rem; line-height: 1.6; color: #bbb; margin-bottom: 30px; }
        
        /* 세련된 실행 버튼 */
        .start-btn {
            padding: 15px 50px; font-size: 1.2rem; font-weight: bold; color: #fff;
            background: #b71c1c; border: none; border-radius: 30px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .start-btn:hover { background: #d32f2f; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(183, 28, 28, 0.5); }
        
        /* 게임 화면 영역 */
        #dos { width: 100vw; height: 100vh; display: none; position: fixed; inset: 0; background: #000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkAccess()">

    <div id="intro-layer" class="intro-container" style="display: none;">
        <div class="intro-content">
            <h1>삼국지 영걸전</h1>
            <p>
                유비, 관우, 장비의 도원결의부터 촉한의 건국까지.<br>
                난세의 영웅이 되어 삼국통일의 대업을 완수해 보세요.
            </p>
            <button class="start-btn" onclick="launchGame()">전장으로 출진</button>
        </div>
    </div>

    <div id="dos"></div>

    <script>
        // 접속 시 암호 확인 함수
        function checkAccess() {
            const password = prompt("접속 암호를 입력하세요.");
            if (password === "2026") {
                document.getElementById("intro-layer").style.display = "flex";
            } else {
                alert("암호가 틀렸습니다.");
                location.reload();
            }
        }

        function launchGame() {
            // 레이어 전환
            document.getElementById("intro-layer").style.display = "none";
            document.getElementById("dos").style.display = "block";

            // 게임 실행 (영걸전 파일명으로 변경 필요: 예 - eiketsuden.jsdos)
            Dos(document.getElementById("dos"), {
                url: "./eiketsuden.jsdos", // 여기에 실제 영걸전 jsdos 파일 경로를 넣으세요
                noCloud: true,
                autoStart: true
            }).then((runtime) => {
                // 영걸전 실행 명령어 (보통 EKD.COM 또는 KOEI.EXE)
                runtime.dos.main(["-c", "config -set cpu cycles=15000", "-c", "EKD.COM"]);
            }).catch((err) => {
                alert("게임 로드 실패: " + err.message);
                location.reload();
            });
        }
    </script>
</body>
</html>
