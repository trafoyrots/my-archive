<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼국지 영걸전 아카이브</title>
    
    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f4f4f9; color: #333; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        .intro-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
        }
        .intro-content { 
            max-width: 700px; padding: 40px; border-radius: 20px; background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: fadeIn 1s ease-out; 
        }
        .game-img { width: 100%; max-width: 500px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        h1 { font-size: 2.5rem; color: #2c3e50; margin-bottom: 15px; border-bottom: 3px solid #b71c1c; display: inline-block; padding-bottom: 5px; }
        .start-btn {
            padding: 15px 60px; font-size: 1.2rem; font-weight: bold; color: #fff;
            background: #2c3e50; border: none; border-radius: 5px; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .start-btn:hover { background: #b71c1c; transform: translateY(-2px); }
        #admin-panel { 
            margin-top: 20px; padding: 15px; background: #f0f7ff; border: 1px solid #adc6ff; border-radius: 5px; 
            font-size: 0.95rem; color: #1d39c4; display: none; 
        }
        .copyright-section {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 0.85rem; color: #888; line-height: 1.5;
        }
        .copyright-section hr { width: 50px; border: 0; border-top: 1px solid #ccc; margin: 10px auto; }
        #dos { width: 100vw; height: 100vh; display: none; position: fixed; inset: 0; background: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkAccess()">

    <div id="intro-layer" class="intro-container" style="display: none;">
        <div class="intro-content">
            <img src="sddefault.jpg" alt="삼국지 영걸전" class="game-img">
            <h1>삼국지 영걸전</h1>
            <p>비영리 목적으로 운영되는 팬 메이드 아카이브 페이지입니다.</p>
            
            <button class="start-btn" onclick="launchGame()">게임 플레이하기</button>

            <div id="admin-panel">
                <strong>📊 관리자 통계 정보</strong><br>
                실시간 누적 실행: <span id="play-count">0</span>회
            </div>
        </div>

        <div class="copyright-section">
            <hr>
            This project is a non-profit fan-made archive. All rights for the original game belong to KOEI.<br>
            모든 권리는 KOEI에 있으며, 저작권자의 요청이 있을 경우 즉시 삭제하겠습니다.
        </div>
    </div>

    <div id="dos"></div>

    <script>
        const API_NAMESPACE = "eiketsu_service"; 
        const ENCODED_PW = "YWRtaW43Nzc="; // 'admin777'

        function checkAccess() {
            const isPassed = sessionStorage.getItem("is_passed");
            if (isPassed === "true") {
                showPage(sessionStorage.getItem("isAdmin") === "true");
                return;
            }

            const password = prompt("접속 암호를 입력하세요.");
            if (password === "2026") {
                sessionStorage.setItem("is_passed", "true");
                sessionStorage.setItem("isAdmin", "false");
                showPage(false);
            } else if (btoa(password) === ENCODED_PW) { 
                sessionStorage.setItem("is_passed", "true");
                sessionStorage.setItem("isAdmin", "true");
                showPage(true);
            } else {
                alert("암호가 틀렸습니다.");
                location.reload();
            }
        }

        function showPage(adminMode) {
            document.getElementById("intro-layer").style.display = "flex";
            if (adminMode) {
                document.getElementById("admin-panel").style.display = "block";
                fetchStats();
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch(`https://api.counterapi.dev/v1/${API_NAMESPACE}/play_count`);
                if (response.status === 404) {
                    document.getElementById("play-count").innerText = "0";
                    return;
                }
                const data = await response.json();
                document.getElementById("play-count").innerText = data.count || 0;
            } catch (err) {
                document.getElementById("play-count").innerText = "연결 대기 중";
            }
        }

        async function launchGame() {
            fetch(`https://api.counterapi.dev/v1/${API_NAMESPACE}/play_count/up`).catch(() => {});

            document.getElementById("intro-layer").style.display = "none";
            document.getElementById("dos").style.display = "block";

            const ci = await Dos(document.getElementById("dos"), {
                url: "./nuasuw2.dat",
                noCloud: true,
                autoStart: true
            });
            
            await ci.persist("eiketsu-save");

            ci.dos.main(["-c", "config -set cpu cycles=15000", "-c", "EKD.COM"]);
        }
    </script>
</body>
</html>
